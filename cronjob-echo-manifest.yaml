service:
  name: echoService
  identifier: echoService
  orgIdentifier: default
  projectIdentifier: default_project
  serviceDefinition:
    spec:
      manifests:
        - manifest:
            identifier: cronjob
            type: HelmChart
            spec:
              store:
                type: Github
                spec:
                  connectorRef: ycj_gitconnector
                  gitFetchType: Branch
                  folderPath: charts/cronjob
                  repoName: Harness_CronJob
                  branch: main
              chartName: cronjob-chart
              chartVersion: 1.0.0
              helmVersion: V3
              skipResourceVersioning: false
              enableDeclarativeRollback: false
    type: NativeHelm
